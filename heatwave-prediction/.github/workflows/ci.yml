name: Heatwave Prediction CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: heatwave
          POSTGRES_PASSWORD: heatwave123
          POSTGRES_DB: heatwave_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://heatwave:heatwave123@localhost:5432/heatwave_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Lint
        working-directory: backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8000

  # ── Build & Push Docker Images ─────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

  # ── ML Model Validation ────────────────────────────────────────────────────
  validate-models:
    name: ML Model Validation
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install ML dependencies
        working-directory: backend
        run: pip install numpy pandas scikit-learn xgboost torch --quiet

      - name: Validate model architecture
        working-directory: backend
        run: |
          python -c "
          from app.ml.lstm_model import LSTMForecaster, FEATURES
          from app.ml.xgboost_classifier import XGBoostClassifier, CLASSIFIER_FEATURES
          from app.ml.severity_model import SeverityScorer
          import torch

          # Test LSTM architecture
          model = LSTMForecaster()
          x = torch.randn(2, 30, len(FEATURES))
          out = model(x)
          assert out.shape == (2, 7, 2), f'LSTM output shape wrong: {out.shape}'

          # Test XGBoost init
          clf = XGBoostClassifier()
          assert len(CLASSIFIER_FEATURES) >= 20, 'Too few features'

          # Test severity scorer
          scorer = SeverityScorer()
          result = scorer.rule_based_severity(42.0, 5.5, 3)
          assert result in ['none','mild','moderate','severe','extreme']

          print('✅ All model architecture checks passed')
          "
